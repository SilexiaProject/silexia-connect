<!DOCTYPE html>

<html>

<head>

<title>Conectar Google</title>

<style>

body{

background:#0c0c0f;

color:white;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}

.card{

background:#17171d;

padding:40px;

border-radius:20px;

width:420px;

}

input{

width:100%;

padding:15px;

margin-top:10px;

margin-bottom:15px;

background:#0f1015;

color:white;

border:none;

border-radius:10px;

box-sizing:border-box;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:12px;

background:#1e7fff;

color:white;

font-size:18px;

cursor:pointer;

}

.small{

opacity:.7;

font-size:13px;

margin-top:20px;

}

</style>

</head>

<body>

<div class="card">

<h1>

Conectar tu cuenta de Google

</h1>

<p>

Permite conectar los servicios necesarios para automatizar agenda y gestión.

</p>

<input
id="email"
placeholder="Correo Google del negocio"
>

<button onclick="conectar()">

Solicitar conexión

</button>

<div class="small">

✓ Calendar<br>
✓ Sheets<br>
✓ Drive<br>
✓ Envío de correo

</div>

</div>

<script>

function conectar(){

const email=

document
.getElementById("email")
.value

window.location.href=

"https://silexia-project-n8n.oosc7q.easypanel.host/webhook/google-connect?email="

+ encodeURIComponent(email)

}

</script>

</body>

</html>
